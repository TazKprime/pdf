name: Build Windows Portable

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build --target universal-pc-windows-msvc
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Find portable exe
        id: find_exe
        shell: bash
        run: |
          find src-tauri/target -name "*.exe" -path "*/release/bundle/*" 2>/dev/null | head -20
          # Also check for NSIS portable
          find src-tauri/target -name "*.exe" -not -path "*/deps/*" 2>/dev/null | head -20

      - name: Upload NSIS Installer
        uses: actions/upload-artifact@v4
        with:
          name: pdf-editor-windows-installer
          path: src-tauri/target/*/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload MSI Installer
        uses: actions/upload-artifact@v4
        with:
          name: pdf-editor-windows-msi
          path: src-tauri/target/*/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload Portable Binary
        uses: actions/upload-artifact@v4
        with:
          name: pdf-editor-windows-portable
          path: src-tauri/target/*/release/pdf-editor.exe
          if-no-files-found: warn

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: PDF Editor v1.0.0
          draft: false
          prerelease: false
          files: |
            src-tauri/target/*/release/bundle/nsis/*.exe
            src-tauri/target/*/release/bundle/msi/*.msi
            src-tauri/target/*/release/pdf-editor.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
