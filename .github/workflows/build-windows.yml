name: Build Windows Portable

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npx vite build

      - name: Verify frontend build output
        shell: bash
        run: |
          echo "=== dist/ contents ==="
          ls -la dist/
          echo ""
          echo "=== dist/index.html ==="
          cat dist/index.html
          echo ""
          echo "=== Does index.html reference bundle? ==="
          grep -o 'src="[^"]*"' dist/index.html || echo "NO SCRIPT TAGS FOUND"

      - name: Build Tauri app
        run: npx tauri build --target x86_64-pc-windows-msvc
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Verify resource bundle
        shell: bash
        run: |
          echo "=== Looking for bundled index.html ==="
          find src-tauri/target -name "index.html" 2>/dev/null
          echo ""
          echo "=== NSIS output ==="
          find src-tauri/target -name "*.exe" -path "*/bundle/*" 2>/dev/null
          echo ""
          echo "=== Release binary ==="
          ls -la src-tauri/target/x86_64-pc-windows-msvc/release/pdf-editor.exe 2>/dev/null || echo "not found"
          echo ""
          echo "=== Resources dir ==="
          find src-tauri/target -path "*/release/bundle/nsis" -type d 2>/dev/null
          find src-tauri/target -name "pdf-editor_*.nsis.zip" 2>/dev/null
          find src-tauri/target -name "pdf-editor_*.nsis.exe" 2>/dev/null

      - name: Upload NSIS Installer
        uses: actions/upload-artifact@v4
        with:
          name: pdf-editor-windows-installer
          path: src-tauri/target/*/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload MSI Installer
        uses: actions/upload-artifact@v4
        with:
          name: pdf-editor-windows-msi
          path: src-tauri/target/*/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload Portable Binary
        uses: actions/upload-artifact@v4
        with:
          name: pdf-editor-windows-portable
          path: src-tauri/target/*/release/pdf-editor.exe
          if-no-files-found: warn

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: PDF Editor v1.0.0
          draft: false
          prerelease: false
          files: |
            src-tauri/target/*/release/bundle/nsis/*.exe
            src-tauri/target/*/release/bundle/msi/*.msi
            src-tauri/target/*/release/pdf-editor.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
